[cluster]
name = "gravity-devnet-prague"
base_dir = "/tmp/gnode-prague"

[genesis_source]
genesis_path = "./artifacts/genesis.json"
waypoint_path = "./artifacts/waypoint.txt"

[[nodes]]
id = "node1"
role = "genesis"
source = { project_path = "../" }
host = "127.0.0.1"
validator_port = 6284
vfn_port = 6294
rpc_port = 8647
metrics_port = 9105
inspection_port = 10104
https_port = 1126
authrpc_port = 8655
reth_p2p_port = 12128

[faucet_init]
num_accounts = 10000
