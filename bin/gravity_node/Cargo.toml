[package]
name = "gravity_node"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
publish.workspace = true
repository.workspace = true
rust-version.workspace = true


[features]
# Forward feature to gaptos so `-p gravity_node --features randomness_disabled` works
randomness_disabled = ["gaptos/randomness_disabled"]
default = []

[dependencies]
futures-util = "0.3.30"
clap = { version = "4.5.17", features = ["derive", "env"] }
futures = "0.3.30"
dirs = "5.0.1"
tokio = "1.40.0"
tokio-stream = "0.1.16"
eyre = "0.6.12"
tracing = "0.1.40"
tempfile = "3.12.0"
jsonrpsee = "0.24"
hex = "0.4.3"
serde_json = "1.0.128"
serde = "^1.0.226"
bincode = "1.3"
time = "0.3.36"
anyhow = "1.0.87"
greth = { git = "https://github.com/Galxe/gravity-reth", rev = "b0ec42c647fb397b1887a5d41bc76441f545c5fa" }
reqwest = "0.12.9"
alloy-primitives = { version = "=1.3.1", default-features = false, features = ["map-foldhash"] }
alloy-eips = { version = "^1.0.37", default-features = false }
alloy-consensus = { version = "=1.0.37" }
alloy-serde = { version = "=1.0.37" }
alloy-transport-http = "=1.0.37"
alloy-rpc-types-eth = "=1.0.37"
async-trait.workspace = true
api.workspace = true
gaptos = { workspace = true, features = ["gcp-secret-manager"] }
block-buffer-manager.workspace = true
proposer-reth-map.workspace = true
build-info.workspace = true
# Force libssl to be statically linked into the binary so it can ship as a
# single self-contained artifact across libssl1.1 (Debian 11) and libssl3
# (Debian 12+) hosts. native-tls (pulled transitively via aptos-vault-client
# and google-cloud-* under gaptos's gcp-secret-manager feature) is the
# consumer; with `vendored`, openssl-sys compiles OpenSSL from source and
# statically links it, removing the runtime libssl.so.* dependency.
# gravity_cli applies the same trick — keep them in sync. Without this,
# `cargo build -p gravity_node` (e.g. via `make gravity_node`) scopes the
# feature resolve to gravity_node only and openssl-sys defaults to dynamic
# system linkage, producing a binary that fails on hosts whose libssl ABI
# differs from the build host.
openssl = { version = "0.10", features = ["vendored"] }
rayon = "1.7.0"
tracing-flame = "0.2"
tracing-timing = "0.6"
tracing-subscriber = "0.3.19"
tikv-jemallocator.workspace = true
tikv-jemalloc-ctl.workspace = true
tikv-jemalloc-sys.workspace = true
pprof = { version = "0.14", features = ["flamegraph", "protobuf-codec"] }
once_cell.workspace = true
bytes.workspace = true
dashmap.workspace = true
bcs.workspace = true

[build-dependencies]
shadow-rs.workspace = true

