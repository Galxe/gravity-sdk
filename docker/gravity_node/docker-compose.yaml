# Single-validator deployment. One host, one validator.
# Image is binary-only: genesis, waypoint, identity, validator.yaml and
# reth_config.json live in ./config/ on the host and are mounted read-only.
# Chain data and logs live on named volumes so `docker compose pull && up -d`
# survives upgrades.
#
# Usage:
#   cp .env.example .env && $EDITOR .env
#   # place genesis.json, waypoint.txt, identity.yaml, validator.yaml,
#   # reth_config.json, relayer_config.json into ./config/
#   docker compose up -d
#
# Upgrade:
#   docker load -i gravity_node-<tag>.tar    # or docker compose pull
#   IMAGE_TAG=<new-tag> docker compose up -d

services:
  gravity_node:
    image: ${GRAVITY_IMAGE:-galxe/gravity_node}:${IMAGE_TAG:-latest}
    container_name: gravity_node
    restart: unless-stopped

    # Host networking: validator P2P and reth P2P need predictable, publicly
    # reachable ports. Bridge + port mapping makes advertised addresses flaky.
    # If you must isolate, switch to `ports:` and set advertised addrs explicitly.
    network_mode: host

    volumes:
      - ./config:/gravity/config:ro
      - gravity-data:/gravity/data
      - gravity-logs:/gravity/logs

    environment:
      RUST_BACKTRACE: "1"
      RUST_LOG: ${RUST_LOG:-info}

    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576

    stop_grace_period: 60s
    stop_signal: SIGTERM

    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  gravity-data:
  gravity-logs:
